services:
  postgres:
    image: postgres:16-alpine
    container_name: presight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: presight
      POSTGRES_PASSWORD: presight
      POSTGRES_DB: presight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presight -d presight"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
