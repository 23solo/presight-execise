services:
  postgres:
    image: postgres:16-alpine
    container_name: presight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: presight
      POSTGRES_PASSWORD: presight
      POSTGRES_DB: presight
    ports:
      # Host 15432 → container 5432 (avoids clashing with a local Postgres)
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presight -d presight"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./presight-assignment-server
    container_name: presight-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgres://presight:presight@postgres:5432/presight
      DATABASE_SSL: "false"
      CORS_ORIGIN: http://localhost:18080,http://localhost:5173
      API_DELAY_MS: 700
      SEED_USER_COUNT: 5000
      SEED_FORCE: "false"
    ports:
      # Host 13001 → container 3001
      - "13001:3001"

  client:
    build:
      context: ./presight-assignment-client
      args:
        VITE_API_BASE_URL: ""
    container_name: presight-client
    restart: unless-stopped
    depends_on:
      - api
    ports:
      # Host 18080 → container 80 (avoids clashing with common 8080 apps)
      - "18080:80"

volumes:
  postgres_data:
